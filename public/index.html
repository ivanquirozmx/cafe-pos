<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>☕ Café POS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- =================== PANTALLA DE LOGIN =================== -->
  <div id="pantalla-login" class="pantalla-login">
    <div class="login-card">
      <div class="login-logo">☕</div>
      <h2>Café POS</h2>
      <p class="login-subtitle">Inicia sesión para continuar</p>
      <form id="form-login">
        <div class="campo-form">
          <label for="login-usuario">Usuario</label>
          <input type="text" id="login-usuario" placeholder="usuario" autocomplete="username" required />
        </div>
        <div class="campo-form">
          <label for="login-password">Contraseña</label>
          <input type="password" id="login-password" placeholder="contraseña" autocomplete="current-password" required />
        </div>
        <p id="login-error" class="login-error oculto"></p>
        <button type="submit" class="btn-primary btn-login-submit" id="btn-login">Entrar</button>
      </form>
    </div>
  </div>

  <!-- =================== CONTENIDO PRINCIPAL =================== -->
  <div id="app-contenido" class="oculto">

    <header>
      <div class="header-izq">
        <h1>☕ Café POS</h1>
        <nav id="tabs">
          <button class="tab activo" data-tab="pos">🧾 Punto de Venta</button>
          <button class="tab tab-admin" data-tab="historial">📊 Historial</button>
          <button class="tab tab-admin" data-tab="productos">📦 Productos</button>
          <button class="tab tab-admin" data-tab="clientes">👤 Clientes</button>
        </nav>
      </div>
      <div class="header-der">
        <span id="fecha-hora"></span>
        <div id="info-usuario">
          <span id="usuario-nombre"></span>
          <button id="btn-logout" class="btn-logout">Salir</button>
        </div>
      </div>
    </header>

    <!-- =================== TAB: POS =================== -->
    <div id="tab-pos" class="tab-contenido activo">
      <main>
        <!-- Panel izquierdo: Menú -->
        <section id="menu">
          <h2>Menú</h2>
          <div id="filtros-categoria"></div>
          <div id="lista-productos">
            <div class="skeleton-grid">
              <div class="skeleton"></div><div class="skeleton"></div>
              <div class="skeleton"></div><div class="skeleton"></div>
              <div class="skeleton"></div><div class="skeleton"></div>
            </div>
          </div>
        </section>

        <!-- Panel derecho: Orden actual -->
        <section id="orden">
          <h2>Orden Actual</h2>

          <div id="seccion-cliente">
            <div class="input-con-boton">
              <input type="text" id="buscar-cliente" placeholder="Buscar cliente frecuente..." autocomplete="off" />
              <button id="btn-quitar-cliente" class="btn-icono oculto" title="Quitar cliente">✕</button>
            </div>
            <div id="resultado-cliente"></div>
          </div>

          <div id="lista-orden"></div>

          <div id="totales">
            <div class="linea-total">
              <span>Subtotal:</span>
              <span id="subtotal">$0.00</span>
            </div>
            <div class="linea-total descuento" id="fila-descuento" style="display:none">
              <span>Descuento:</span>
              <span id="descuento">-$0.00</span>
            </div>
            <div class="linea-total total">
              <span>Total:</span>
              <span id="total">$0.00</span>
            </div>
          </div>

          <div id="acciones">
            <select id="metodo-pago">
              <option value="efectivo">💵 Efectivo</option>
              <option value="tarjeta">💳 Tarjeta</option>
              <option value="transferencia">📱 Transferencia</option>
            </select>
            <button id="btn-cobrar" class="btn-primary" disabled>Cobrar</button>
            <button id="btn-cancelar" class="btn-danger">Cancelar Orden</button>
          </div>
        </section>
      </main>
    </div>

    <!-- =================== TAB: HISTORIAL =================== -->
    <div id="tab-historial" class="tab-contenido oculto">
      <div class="contenedor-tab">
        <div class="historial-header">
          <h2>Historial de Ventas</h2>
          <div class="filtros-fecha">
            <label>Desde: <input type="date" id="fecha-desde" /></label>
            <label>Hasta: <input type="date" id="fecha-hasta" /></label>
            <button class="btn-secundario" id="btn-filtrar-ventas">Buscar</button>
            <button class="btn-secundario" id="btn-ventas-hoy">Hoy</button>
          </div>
        </div>

        <div class="resumen-cards" id="resumen-cards">
          <div class="resumen-card">
            <div class="resumen-valor" id="res-cantidad">—</div>
            <div class="resumen-label">Ventas</div>
          </div>
          <div class="resumen-card">
            <div class="resumen-valor" id="res-total">—</div>
            <div class="resumen-label">Total</div>
          </div>
          <div class="resumen-card">
            <div class="resumen-valor" id="res-mas-vendido">—</div>
            <div class="resumen-label">Más vendido</div>
          </div>
        </div>

        <div id="tabla-ventas"></div>
      </div>
    </div>

    <!-- =================== TAB: PRODUCTOS =================== -->
    <div id="tab-productos" class="tab-contenido oculto">
      <div class="contenedor-tab">
        <div class="historial-header">
          <h2>Gestión de Productos</h2>
          <button class="btn-primary" id="btn-nuevo-producto">+ Nuevo Producto</button>
        </div>
        <div id="admin-lista-productos"></div>
      </div>
    </div>

    <!-- =================== TAB: CLIENTES =================== -->
    <div id="tab-clientes" class="tab-contenido oculto">
      <div class="contenedor-tab">
        <div class="historial-header">
          <h2>Clientes Frecuentes</h2>
          <button class="btn-primary" id="btn-nuevo-cliente">+ Nuevo Cliente</button>
        </div>
        <div id="admin-lista-clientes"></div>
      </div>
    </div>

    <!-- =================== MODAL: VENTA EXITOSA =================== -->
    <div id="modal-exito" class="modal oculto">
      <div class="modal-contenido">
        <div class="modal-icono">✅</div>
        <h3>¡Venta Registrada!</h3>
        <div id="detalle-venta"></div>
        <button class="btn-primary" id="btn-nueva-orden">Nueva Orden</button>
      </div>
    </div>

    <!-- =================== MODAL: PRODUCTO =================== -->
    <div id="modal-producto" class="modal oculto">
      <div class="modal-contenido">
        <h3 id="titulo-modal-producto">Nuevo Producto</h3>
        <form id="form-producto">
          <div class="campo-form">
            <label>Nombre</label>
            <input type="text" id="prod-nombre" placeholder="Ej: Café Americano" required />
          </div>
          <div class="campo-form">
            <label>Categoría</label>
            <input type="text" id="prod-categoria" placeholder="Ej: Bebidas calientes" required />
          </div>
          <div class="campo-form">
            <label>Precio ($)</label>
            <input type="number" id="prod-precio" placeholder="Ej: 45" min="1" step="0.5" required />
          </div>
          <div class="modal-botones">
            <button type="submit" class="btn-primary" id="btn-submit-producto">Guardar</button>
            <button type="button" class="btn-danger" id="btn-cerrar-modal-producto">Cancelar</button>
          </div>
        </form>
      </div>
    </div>

    <!-- =================== MODAL: CLIENTE =================== -->
    <div id="modal-cliente" class="modal oculto">
      <div class="modal-contenido">
        <h3 id="titulo-modal-cliente">Nuevo Cliente</h3>
        <form id="form-cliente">
          <div class="campo-form">
            <label>Nombre</label>
            <input type="text" id="cli-nombre" placeholder="Nombre completo" required />
          </div>
          <div class="campo-form">
            <label>Teléfono</label>
            <input type="tel" id="cli-telefono" placeholder="Ej: 555-1234" required />
          </div>
          <div class="campo-form">
            <label>Notas</label>
            <input type="text" id="cli-notas" placeholder="Ej: Alérgico al gluten" />
          </div>
          <div class="modal-botones">
            <button type="submit" class="btn-primary" id="btn-submit-cliente">Registrar</button>
            <button type="button" class="btn-danger" id="btn-cerrar-modal-cliente">Cancelar</button>
          </div>
        </form>
      </div>
    </div>

    <!-- =================== MODAL: CONFIRMACIÓN =================== -->
    <div id="modal-confirmar" class="modal oculto">
      <div class="modal-contenido modal-pequeno">
        <p id="msg-confirmar"></p>
        <div class="modal-botones">
          <button class="btn-primary" id="btn-confirmar-ok">Confirmar</button>
          <button class="btn-danger" id="btn-confirmar-cancel">Cancelar</button>
        </div>
      </div>
    </div>

    <!-- Toast de notificaciones -->
    <div id="toast" class="toast oculto"></div>

  </div><!-- #app-contenido -->

  <script src="app.js"></script>
</body>
</html>
