services:
  # ── Servicio principal: Café POS (Node + JSON files) ─────────────────
  - type: web
    name: cafe-pos
    env: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true

  # ── Backend: API REST con MongoDB Atlas ───────────────────────────────
  - type: web
    name: cafe-pos-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install --omit=dev
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false   # se configura manualmente en el dashboard de Render

  # ── Frontend: React + Vite (sitio estático) ───────────────────────────
  - type: static
    name: cafe-pos-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: false   # pegar la URL del backend después de que esté desplegado
